{% extends "profile_user/base.html" %}
{% load static %}
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.js" integrity="sha384-Q+Dky3iHVJOr6wUjQ4ulh6uQ76an/t+ak1+PjMVaxRjbZamFLAG+u9InkfjbsEQf" crossorigin="anonymous"></script>
{% block content %}

<form method="get" class="navigation-select">
    <label for="page-select">Выберите документ</label>
    <select class = "custom-select mb-4" name="documents" hx-get="{% url 'tiny_mce' %}" hx-target = '#document'
        <option selected>Перейти к...</option>
        <!-- # Отвечает за показ АКТА О ВЫДАЧЕ -->
        <option value="garanty_doc">Акт о гарантии</option>
        <!-- # Отвечает за показ АКТА О ПРИНЯТИИ -->
        <option value="adoption_doc">Акт о принятии</option>
        <!-- # Отвечает за показ АКТА О ОТКАЗЕ -->
        <option value="cancell_doc">Акт о отказе</option>
        <!-- # Отвечает за показ АКТА О ВЫПОЛНЕННЫХ РАБОТАХ -->
        <option value="complete_doc">Акт о выполненных работах</option>
</select>

<div id="document">
    {{ message|safe }}
    <form action="" method="post" name = '{{ cur_doc }}'>
    {% csrf_token %}

    {{ tiny_mce.media }}
    {{ tiny_mce.as_p|safe }}
    {{ button }}

    </form>
</div>

</form>
{% endblock %}
